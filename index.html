<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Puzzle Prototype</title>

    <link
      rel="icon"
      href="assets/images/favicon/favicon-32x32.png"
      type="image/x-icon"
    />

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <!-- CRT shader web-component used by the TV level -->
    <script src="https://unpkg.com/shader-doodle@alpha"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Creepster&family=Special+Elite&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="Games/StackingSquares/StackingSquares.css" />
    <link rel="stylesheet" href="Games/MobilePhone/MobilePhone.css" />
    <link rel="stylesheet" href="Games/PlantPot/PlantPot.css" />
    <link rel="stylesheet" href="Games/TV/TV.css" />
  </head>
  <body>
    <!-- Left Sidebar -->
    <div id="sidebar">
      <h1>Spooky Puzzle</h1>
      <button class="menu-btn" id="btn-new">New Game</button>
      <button class="menu-btn" id="btn-options">Options</button>
    </div>

    <!-- Game Area -->
    <div id="game-wrapper">
      <!-- Start Screen Overlay -->
      <div id="start-screen">
        <button id="btn-start-game" class="menu-btn"></button>
      </div>

      <div id="game-container"></div>

      <!-- Updated Control Panel Input Area -->
      <div id="input-area">
        <div class="input-container">
          <div class="input-wrapper">
            <input
              type="text"
              id="level-code"
              placeholder="Enter code"
              autocomplete="off"
            />
            <button id="btn-submit">EXECUTE</button>
            <button id="btn-replay" class="menu-btn replay-btn">⟳</button>
          </div>
        </div>
        <div class="volume-widget mute-button">
          <span id="vol-icon-ui">🔊</span>
          <input type="range" id="vol-slider-ui" min="0" max="1" step="0.01" />
        </div>
        <button id="btn-info" class="menu-btn info-button">INFO</button>
      </div>
    </div>

    <!-- Right Sidebar Wrapper (toggle button + sliding panel) -->
    <div id="right-sidebar-wrapper">
      <!-- Sliding levels panel -->
      <div id="right-sidebar">
        <h1>Levels</h1>
        <div id="levels-grid"></div>
      </div>
    </div>

    <!-- Options Modal -->
    <div id="options-modal" class="hidden">
      <div class="modal-content">
        <h2>OPTIONS</h2>
        <div class="slider-group">
          <label>MUSIC VOLUME</label>
          <input
            type="range"
            id="music-slider"
            min="0"
            max="1"
            step="0.01"
            value="0.5"
          />
        </div>
        <div class="slider-group">
          <label>SOUND EFFECTS</label>
          <input
            type="range"
            id="sfx-slider"
            min="0"
            max="1"
            step="0.01"
            value="0.8"
          />
        </div>
        <div class="modal-actions">
          <button id="btn-mute" class="menu-btn">🔊 MUTE</button>
          <button id="btn-close-options" class="menu-btn">CLOSE</button>
        </div>
      </div>
    </div>

    <!-- Info Modal -->
    <div id="info-modal" class="hidden">
      <div class="modal-content">
        <h2>LEVEL INFO</h2>
        <div id="info-requires"></div>
        <p
          id="info-text"
          style="
            text-align: center;
            color: #cccccc;
            line-height: 1.6;
            font-size: 18px;
          "
        ></p>
        <div class="modal-actions">
          <button id="btn-close-info" class="menu-btn" style="width: 100%">
            CLOSE
          </button>
        </div>
      </div>
    </div>

    <!-- Game scripts -->
    <script src="Games/StackingSquares/StackingSquares.js"></script>
    <script src="Games/MobilePhone/MobilePhone.js"></script>
    <script src="Games/PlantPot/PlantPot.js"></script>
    <script src="Games/Lightswitch/Lightswitch.js"></script>
    <script src="Games/TV/TV.js"></script>
    <script src="Games/Modem/Modem.js"></script>
    <script src="Games/Telescope/Telescope.js"></script>
    <script src="Games/Prism/Prism.js"></script>
    <script src="Games/Cryptex/Cryptex.js"></script>
    <script src="js/main.js"></script>
    <script src="js/ui.js"></script>
  </body>
</html>
